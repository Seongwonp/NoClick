<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#006c49" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="6" stdDeviation="8" flood-opacity="0.15" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Lens Frame -->
    <circle cx="220" cy="220" r="130" fill="none" stroke="url(#grad)" stroke-width="56" />
    
    <!-- Handle -->
    <line x1="310" y1="310" x2="440" y2="440" stroke="url(#grad)" stroke-width="56" stroke-linecap="round" />
  </g>
  
  <!-- Subtle glass fill -->
  <circle cx="220" cy="220" r="102" fill="#10b981" opacity="0.12" />
  
  <!-- Minimalist, professional reflection -->
  <path d="M 150 160 A 70 70 0 0 1 250 140" fill="none" stroke="#10b981" stroke-width="16" stroke-linecap="round" opacity="0.4" />
</svg>